<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>JueXie个人主页</title>
    <!--加载前端库-->
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
</head>
<body>
    <p id="app">{{version}}</p>
</body>
<script>
    var vm = new Vue({
        el:'#app',
        mounted:function () {
            this.connected()
        },
        data:{
            version:Vue.version
        },
        methods:{
            connected() {
                axios.get({
                    url:'https://wx.xinyangwei.cn/test1',
                    method:'get',
                    responseType:'jsonp'
                }).then(
                    function (value) {
                        console.log(value);
                    }
                ).catch(
                    function (reason) {
                        console.log(reason);
                    }
                );
            }
        }
    });
</script>
</html>
